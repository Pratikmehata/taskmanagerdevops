version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: taskmanager_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: taskmanager
    volumes:
      - mongo_data:/data/db
      - ./database/init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    networks:
      - tasknet
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskmanager_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongo:27017/taskmanager?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      NOTIFICATION_SERVICE_URL: http://notification-service:5001
    ports:
      - "4000:4000"
    networks:
      - tasknet
    volumes:
      - ./backend:/app
      - /app/node_modules

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: taskmanager_notifier
    restart: unless-stopped
    environment:
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FROM_EMAIL: ${FROM_EMAIL}
    ports:
      - "5001:5001"
    networks:
      - tasknet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskmanager_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - tasknet

volumes:
  mongo_data:

networks:
  tasknet:
    driver: bridge
